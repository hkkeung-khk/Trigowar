<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>宇宙三角防衛戰 - 終極對決</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+TC:wght@400;700&display=swap');

        body {
            margin: 0; padding: 0; overflow: hidden; background-color: #050510;
            font-family: 'Noto Sans TC', sans-serif;
            user-select: none; -webkit-user-select: none; touch-action: none;
            width: 100vw; height: 100vh; height: 100dvh;
        }
        .font-space { font-family: 'Orbitron', sans-serif; }
        
        .neon-box { background: rgba(10, 10, 30, 0.85); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
        .neon-p1 { box-shadow: 0 0 10px rgba(0, 255, 255, 0.3); border: 1px solid rgba(0, 255, 255, 0.4); }
        .neon-p2 { box-shadow: 0 0 10px rgba(192, 132, 252, 0.3); border: 1px solid rgba(192, 132, 252, 0.4); }

        .health-bar-container { position: relative; width: 100%; height: 16px; background: #222; border-radius: 8px; overflow: hidden; border: 2px solid #555; }
        .health-bar-p1 { position: absolute; left: 0; top: 0; height: 100%; background: linear-gradient(90deg, #0284c7, #06b6d4); transition: width 0.3s ease; }
        .health-bar-p2 { position: absolute; right: 0; top: 0; height: 100%; background: linear-gradient(270deg, #7e22ce, #c084fc); transition: width 0.3s ease; }
        .health-junction { 
            position: absolute; top: -5px; bottom: -5px; width: 4px; background: #fff; 
            box-shadow: 0 0 15px 5px rgba(255,255,255,0.8); z-index: 10;
            animation: pulseGlow 0.5s infinite alternate, floatBar 2s ease-in-out infinite alternate;
        }

        @keyframes pulseGlow { 0% { box-shadow: 0 0 10px 2px rgba(255,255,255,0.5); } 100% { box-shadow: 0 0 20px 8px rgba(255,255,255,1); } }
        @keyframes floatBar { 0% { transform: translateX(calc(-50% - 3px)); } 100% { transform: translateX(calc(-50% + 3px)); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .shake-err { animation: shake 0.3s ease-in-out; border-color: #ef4444 !important; box-shadow: 0 0 15px #ef4444 !important; }

        @keyframes breatheText {
            0%, 100% { opacity: 0.8; transform: scale(1); text-shadow: 0 0 10px currentColor; }
            50% { opacity: 1; transform: scale(1.05); text-shadow: 0 0 25px currentColor, 0 0 40px currentColor; }
        }
        .animate-breathe { animation: breatheText 2s ease-in-out infinite; }
        
        .flash-correct { border-color: #4ade80 !important; background: rgba(74,222,128,0.2) !important; box-shadow: 0 0 20px rgba(74,222,128,0.6) !important; transition: all 0.2s; }

        @keyframes crisisPulse {
            0%, 100% { box-shadow: 0 0 10px rgba(239, 68, 68, 0.4); border-color: rgba(239, 68, 68, 0.5); background: rgba(239, 68, 68, 0.1); }
            50% { box-shadow: 0 0 30px rgba(239, 68, 68, 0.9); border-color: rgba(239, 68, 68, 1); background: rgba(239, 68, 68, 0.3); }
        }
        .crisis-alert { animation: crisisPulse 0.5s infinite; }

        .draggable { 
            cursor: grab; display: inline-flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.5); border-radius: 8px;
            font-weight: bold; color: #fff; transition: transform 0.1s; z-index: 20; touch-action: none;
        }
        .draggable:active { cursor: grabbing; transform: scale(1.1); }
        .drop-zone {
            display: inline-flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.5); border: 2px dashed rgba(255,255,255,0.4); border-radius: 8px;
            min-width: 40px; min-height: 35px; color: rgba(255,255,255,0.5); transition: all 0.2s;
        }
        .drop-zone.filled { border-style: solid; background: rgba(255,255,255,0.2); color: #fff; border-color: #e2e8f0; }
        .drop-zone.flash-correct { border-color: #4ade80 !important; background: rgba(74,222,128,0.4) !important; color: #fff; }

        .ghost-drag { 
            position: fixed; pointer-events: none; z-index: 9999;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); transform: scale(1.1); opacity: 0.9;
        }

        #gameCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .ui-layer { position: absolute; z-index: 10; width: 100%; height: 100%; display: flex; flex-direction: column; pointer-events: none; }
        
        .btn-l2 { background: linear-gradient(135deg, #1f2937, #374151); border: 1px solid #4b5563; }
        .btn-l2:active { transform: scale(0.95); }

        .svg-tri polygon { fill: rgba(255,255,255,0.05); stroke-width: 2; stroke-linejoin: round; }
        .p1-color { stroke: #0ff; } .p2-color { stroke: #c084fc; }
        .tri-text { fill: #fff; font-weight: bold; text-anchor: middle; alignment-baseline: middle; }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <!-- 音效啟動遮罩 -->
    <div id="audio-init-overlay" class="fixed inset-0 bg-black z-[100] flex flex-col items-center justify-center text-white cursor-pointer transition-opacity" onclick="initAudioAndShowMenu()">
        <h1 class="text-4xl md:text-6xl font-space font-bold animate-breathe mb-4 text-cyan-400">宇宙三角防衛戰</h1>
        <h2 class="text-2xl md:text-3xl font-space font-bold animate-breathe mb-8 text-cyan-200">Trigowar</h2>
        <div class="text-xl md:text-2xl animate-pulse">點擊畫面啟動音效系統 / Click to Enter</div>
    </div>

    <!-- 開局倒數遮罩 -->
    <div id="preGameCountdown" class="fixed inset-0 z-50 bg-black/80 backdrop-blur-sm flex flex-col items-center justify-center hidden pointer-events-auto">
        <div id="countdownNumber" class="text-9xl font-space font-black text-white drop-shadow-[0_0_30px_#0ff] animate-breathe">3</div>
    </div>

    <!-- 遊戲主要 UI -->
    <div id="gameUI" class="ui-layer hidden">
        <div class="top-bar pointer-events-auto bg-black/60 backdrop-blur-sm border-b border-gray-800 p-2 md:p-4 flex flex-col gap-2 shrink-0">
            <div class="flex justify-between items-center px-1">
                <button id="btn-end" onclick="forceEndGame()" class="px-3 py-1 bg-red-600/80 text-white rounded text-sm font-bold hover:bg-red-500 transition">結束遊戲</button>
                <div id="gameInfoText" class="text-yellow-400 font-bold font-space text-sm md:text-lg">爭分奪秒: 0 / 10 題</div>
                <div class="w-[80px]"></div>
            </div>
            
            <div class="flex items-center gap-2 md:gap-4 px-1">
                <div class="flex-col text-left w-16 md:w-24">
                    <div id="lbl-p1" class="text-cyan-400 font-bold text-[10px] md:text-xs">P1 (藍)</div>
                    <div id="p1-score" class="text-white font-space font-bold text-base md:text-lg leading-none">0</div>
                </div>
                
                <div class="flex-1 health-bar-container">
                    <div id="hb-p1" class="health-bar-p1" style="width: 50%;"></div>
                    <div id="hb-p2" class="health-bar-p2" style="width: 50%;"></div>
                    <div id="hb-junction" class="health-junction" style="left: 50%;"></div>
                </div>

                <div class="flex-col text-right w-16 md:w-24">
                    <div id="lbl-p2" class="text-purple-400 font-bold text-[10px] md:text-xs">P2 (紫)</div>
                    <div id="p2-score" class="text-white font-space font-bold text-base md:text-lg leading-none">0</div>
                </div>
            </div>
        </div>

        <div class="battle-area flex-1 flex flex-row px-2 pb-4 pt-2 gap-2 md:gap-8 overflow-hidden pointer-events-none">
            <!-- P1 區域 -->
            <div class="flex-1 pointer-events-auto flex flex-col justify-end relative">
                <div class="w-full h-[6px] bg-gray-800 rounded-full mb-1 overflow-hidden relative">
                    <div id="timer-bar-p1" class="h-full bg-cyan-400 absolute left-0 top-0 transition-all duration-[100ms] ease-linear" style="width: 100%;"></div>
                </div>
                <div id="p1-workspace" class="neon-box neon-p1 p-2 rounded-xl flex flex-col h-full max-h-[500px] transition-all">
                    <div id="p1-svg-container" class="flex-1 relative flex items-center justify-center min-h-[120px]"></div>
                    <div id="p1-prompt" class="text-center font-bold text-cyan-200 mt-1 min-h-[50px] flex items-center justify-center text-sm md:text-base">載入中...</div>
                    <div id="p1-interaction" class="h-16 md:h-20 mt-1 flex items-center justify-center gap-1 md:gap-2"></div>
                </div>
            </div>

            <div class="w-8 md:w-20 shrink-0"></div>

            <!-- P2 區域 -->
            <div class="flex-1 pointer-events-auto flex flex-col justify-end relative">
                <div class="w-full h-[6px] bg-gray-800 rounded-full mb-1 overflow-hidden relative">
                    <div id="timer-bar-p2" class="h-full bg-purple-400 absolute left-0 top-0 transition-all duration-[100ms] ease-linear" style="width: 100%;"></div>
                </div>
                <div id="p2-workspace" class="neon-box neon-p2 p-2 rounded-xl flex flex-col h-full max-h-[500px] transition-all">
                    <div id="p2-svg-container" class="flex-1 relative flex items-center justify-center min-h-[120px]"></div>
                    <div id="p2-prompt" class="text-center font-bold text-purple-200 mt-1 min-h-[50px] flex items-center justify-center text-sm md:text-base">載入中...</div>
                    <div id="p2-interaction" class="h-16 md:h-20 mt-1 flex items-center justify-center gap-1 md:gap-2"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="mainMenu" class="fixed inset-0 z-50 flex flex-col items-center justify-center px-4 bg-black/80 backdrop-blur-md hidden pointer-events-auto">
        <div class="absolute inset-0 pointer-events-none" style="background: radial-gradient(circle at center, rgba(0,255,255,0.1) 0%, #000 100%);"></div>
        
        <h1 class="text-4xl md:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-blue-500 to-purple-500 mb-2 font-space text-center drop-shadow-[0_0_20px_rgba(0,255,255,0.6)] relative z-10 animate-breathe">
            宇宙三角防衛戰
        </h1>
        <h2 class="text-2xl md:text-4xl font-black text-cyan-200 mb-6 font-space text-center drop-shadow-[0_0_15px_rgba(0,255,255,0.8)] relative z-10 animate-breathe">
            Trigowar
        </h2>
        
        <div class="w-full max-w-md bg-gray-900/80 border border-cyan-800/50 rounded-3xl p-5 md:p-6 shadow-[0_0_30px_rgba(0,255,255,0.2)] backdrop-blur-xl relative z-10">
            <!-- 語言切換 Language Toggle -->
            <div class="flex justify-center gap-4 mb-4">
                <button id="lang-zh" onclick="setLang('zh')" class="px-4 py-1 rounded-full bg-blue-600 text-white font-bold text-sm border-2 border-blue-400 transition">中文</button>
                <button id="lang-en" onclick="setLang('en')" class="px-4 py-1 rounded-full bg-gray-700 text-gray-300 font-bold text-sm border-2 border-transparent transition">English</button>
            </div>

            <div class="mb-5">
                <label class="block text-cyan-300 font-bold mb-2 text-center tracking-widest text-sm md:text-base">DIFFICULTY</label>
                <div class="flex gap-3">
                    <button id="btn-lvl1" onclick="setDiff(1)" class="flex-1 py-2 md:py-3 bg-cyan-600/90 text-white rounded-xl font-bold border-2 border-cyan-400 font-space text-base md:text-lg transition shadow-[0_0_10px_rgba(0,255,255,0.5)]">Level 1</button>
                    <button id="btn-lvl2" onclick="setDiff(2)" class="flex-1 py-2 md:py-3 bg-gray-800/80 text-gray-400 rounded-xl font-bold border-2 border-transparent font-space text-base md:text-lg transition">Level 2</button>
                </div>
            </div>

            <div class="mb-5">
                <label class="block text-purple-300 font-bold mb-2 text-center tracking-widest text-sm md:text-base">GAME MODE</label>
                <div class="flex gap-2 mb-3">
                    <button id="btn-mode-count" onclick="setMode('COUNT')" class="flex-1 py-2 md:py-3 bg-purple-600/90 text-white rounded-xl font-bold border-2 border-purple-400 transition shadow-[0_0_10px_rgba(192,132,252,0.5)] text-sm md:text-base">爭分奪秒</button>
                    <button id="btn-mode-time" onclick="setMode('TIME')" class="flex-1 py-2 md:py-3 bg-gray-800/80 text-gray-400 rounded-xl font-bold border-2 border-transparent transition text-sm md:text-base">霸王餐</button>
                    <button id="btn-mode-prac" onclick="setMode('PRACTICE')" class="flex-1 py-2 md:py-3 bg-gray-800/80 text-gray-400 rounded-xl font-bold border-2 border-transparent transition text-sm md:text-base">練習模式</button>
                </div>
                
                <div id="setting-count" class="flex items-center justify-center gap-3 bg-black/40 p-2 md:p-3 rounded-lg border border-gray-700">
                    <span id="lbl-set-count" class="text-white font-bold text-sm md:text-base">設定題數:</span>
                    <input type="number" id="input-count" value="10" min="1" max="50" class="w-16 md:w-20 bg-gray-800 text-cyan-400 font-space font-bold rounded px-2 py-1 border border-cyan-700 text-center text-base md:text-lg outline-none">
                </div>
                <div id="setting-time" class="flex items-center justify-center gap-3 bg-black/40 p-2 md:p-3 rounded-lg border border-gray-700 hidden">
                    <span id="lbl-set-time" class="text-white font-bold text-sm md:text-base">設定秒數:</span>
                    <input type="number" id="input-time" value="60" min="10" max="300" class="w-16 md:w-20 bg-gray-800 text-purple-400 font-space font-bold rounded px-2 py-1 border border-purple-700 text-center text-base md:text-lg outline-none">
                </div>
                <div id="setting-personal" class="flex items-center justify-center gap-3 bg-black/40 p-2 md:p-3 rounded-lg border border-gray-700 mt-2">
                    <span id="lbl-set-personal" class="text-white font-bold text-sm md:text-base">專屬作答秒數:</span>
                    <input type="number" id="input-personal" value="30" min="5" max="100" class="w-16 md:w-20 bg-gray-800 text-yellow-400 font-space font-bold rounded px-2 py-1 border border-yellow-700 text-center text-base md:text-lg outline-none">
                </div>
            </div>

            <button id="btn-start" onclick="startPreGameCountdown()" class="w-full py-3 md:py-4 mt-2 bg-gradient-to-r from-green-500 to-emerald-600 text-white rounded-xl text-xl md:text-2xl font-black tracking-widest shadow-[0_0_20px_rgba(16,185,129,0.6)] hover:scale-105 hover:shadow-[0_0_30px_rgba(16,185,129,0.8)] transition-all">
                開始作戰 / START
            </button>
        </div>
    </div>

    <!-- 結算畫面 -->
    <div id="endScreen" class="fixed inset-0 bg-black/95 z-50 flex flex-col items-center justify-center px-4 hidden backdrop-blur-lg pointer-events-auto">
        <h1 id="endTitle" class="text-4xl md:text-5xl font-black text-white mb-6 font-space text-center drop-shadow-[0_0_15px_rgba(255,255,255,0.5)] animate-breathe">GAME OVER</h1>
        <div class="w-full max-w-lg bg-gray-800 border border-gray-600 rounded-3xl p-4 md:p-6 shadow-2xl flex flex-col gap-4 relative overflow-hidden">
            <div class="flex justify-between items-center p-3 md:p-4 bg-gray-900 rounded-2xl border border-cyan-800 relative z-10">
                <div id="res-p1" class="text-cyan-400 font-bold text-lg md:text-xl">Player 1 (藍)</div>
                <div class="text-right">
                    <div class="text-white font-space text-3xl md:text-4xl font-bold" id="res-score1">0</div>
                    <div class="text-gray-400 text-xs md:text-sm"><span id="lbl-cor1">答對: </span><span id="res-cor1">0</span><span id="lbl-q1"> 題</span></div>
                </div>
            </div>
            <div class="flex justify-between items-center p-3 md:p-4 bg-gray-900 rounded-2xl border border-purple-800 relative z-10">
                <div id="res-p2" class="text-purple-400 font-bold text-lg md:text-xl">Player 2 (紫)</div>
                <div class="text-right">
                    <div class="text-white font-space text-3xl md:text-4xl font-bold" id="res-score2">0</div>
                    <div class="text-gray-400 text-xs md:text-sm"><span id="lbl-cor2">答對: </span><span id="res-cor2">0</span><span id="lbl-q2"> 題</span></div>
                </div>
            </div>
        </div>
        <button id="btn-back-menu" onclick="showMenu()" class="mt-8 px-6 py-2 md:px-8 md:py-3 bg-white text-black rounded-full text-lg md:text-xl font-bold hover:scale-105 transition shadow-[0_0_15px_rgba(255,255,255,0.5)]">返回主畫面</button>
    </div>

    <script>
        let currentLang = 'zh';
        const i18n = {
            zh: {
                modeCount: "爭分奪秒", modeTime: "霸王餐", modePrac: "練習模式",
                setCount: "設定題數:", setTime: "設定秒數:", setPersonal: "專屬作答秒數:",
                btnStart: "開始作戰 / START", btnEnd: "結束遊戲", btnMenu: "返回主畫面",
                p1Blue: "P1 (藍)", p2Purple: "P2 (紫)",
                pracModeInfo: "練習模式 (不計分)",
                timeUp: "時間到！", countReached: "題數達成！",
                winP1: "恭喜！Player 1 勝出！", winP2: "恭喜！Player 2 勝出！", draw: "平手！",
                pracCorrect: "正確！", pracWrong: "錯誤！", btnNext: "下一題", btnRetry: "再試一次",
                dragHelp: "請將 θ 拖至正確角",
                lblCor: "答對: ", lblQ: " 題",
                prog: (c, m) => `進度: ${c} / ${m} 題`,
                timeLeft: (l) => `倒數計時: ${l} 秒`
            },
            en: {
                modeCount: "Questions", modeTime: "Survival", modePrac: "Practice",
                setCount: "Target Qs:", setTime: "Total Time:", setPersonal: "Time per Q:",
                btnStart: "START MISSION", btnEnd: "End Game", btnMenu: "Main Menu",
                p1Blue: "P1 (Blue)", p2Purple: "P2 (Purple)",
                pracModeInfo: "Practice Mode (No Score)",
                timeUp: "Time's up!", countReached: "Target reached!",
                winP1: "Congratulations! Player 1 Wins!", winP2: "Congratulations! Player 2 Wins!", draw: "Draw!",
                pracCorrect: "Correct!", pracWrong: "Wrong!", btnNext: "Next", btnRetry: "Retry",
                dragHelp: "Drag θ to the correct angle",
                lblCor: "Correct: ", lblQ: "",
                prog: (c, m) => `Progress: ${c} / ${m}`,
                timeLeft: (l) => `Time Left: ${l} s`
            }
        };

        function setLang(lang) {
            currentLang = lang;
            const t = i18n[lang];
            
            document.getElementById('lang-zh').className = lang === 'zh' ? "px-4 py-1 rounded-full bg-blue-600 text-white font-bold text-sm border-2 border-blue-400 transition" : "px-4 py-1 rounded-full bg-gray-700 text-gray-300 font-bold text-sm border-2 border-transparent transition";
            document.getElementById('lang-en').className = lang === 'en' ? "px-4 py-1 rounded-full bg-blue-600 text-white font-bold text-sm border-2 border-blue-400 transition" : "px-4 py-1 rounded-full bg-gray-700 text-gray-300 font-bold text-sm border-2 border-transparent transition";

            document.getElementById('btn-mode-count').innerText = t.modeCount;
            document.getElementById('btn-mode-time').innerText = t.modeTime;
            document.getElementById('btn-mode-prac').innerText = t.modePrac;
            document.getElementById('lbl-set-count').innerText = t.setCount;
            document.getElementById('lbl-set-time').innerText = t.setTime;
            document.getElementById('lbl-set-personal').innerText = t.setPersonal;
            document.getElementById('btn-start').innerText = t.btnStart;
            
            document.getElementById('btn-end').innerText = t.btnEnd;
            document.getElementById('lbl-p1').innerText = t.p1Blue;
            document.getElementById('lbl-p2').innerText = t.p2Purple;
            document.getElementById('res-p1').innerText = t.p1Blue;
            document.getElementById('res-p2').innerText = t.p2Purple;
            document.getElementById('lbl-cor1').innerText = t.lblCor;
            document.getElementById('lbl-cor2').innerText = t.lblCor;
            document.getElementById('lbl-q1').innerText = t.lblQ;
            document.getElementById('lbl-q2').innerText = t.lblQ;
            document.getElementById('btn-back-menu').innerText = t.btnMenu;
            
            if (gameState === 'PLAYING' && mode === 'PRACTICE') {
                document.getElementById('gameInfoText').innerText = t.pracModeInfo;
            }
        }

        let difficulty = 1; 
        let mode = 'COUNT'; 
        let maxCount = 10;
        let maxTime = 60;
        let maxPersonalTime = 30;
        
        let gameState = 'INIT'; 
        let startTime = 0;
        let mainTimer = null;
        let globalQuestionsAnswered = 0;

        let isAudioInit = false;
        let bgmSynths = [];
        let bgmParts = [];
        let currentTrackIdx = -1;
        let menuTrackIdx = -1;
        
        // 4 首不同風格的 BGM
        async function initAudioAndShowMenu() {
            if(isAudioInit) return;
            await Tone.start();
            Tone.Transport.bpm.value = 110;
            
            // Track 0: 宇宙氛圍 (首頁)
            const synth0 = new Tone.PolySynth(Tone.Synth).toDestination(); synth0.volume.value = -18;
            const part0 = new Tone.Sequence((time, note) => { synth0.triggerAttackRelease(note, "2n", time); }, ["C4", "E4", "G4", "B3", "C4", "A3", "F3", "G3"], "2n");
            
            // Track 1: 科技律動 (戰鬥)
            const synth1 = new Tone.Synth({oscillator: {type: "square"}}).toDestination(); synth1.volume.value = -20;
            const part1 = new Tone.Sequence((time, note) => { synth1.triggerAttackRelease(note, "16n", time); }, ["C3", "G3", "C4", "E4", "G4", "E4", "C4", "G3"], "8n");
            
            // Track 2: 緊張低音 (戰鬥)
            const synth2 = new Tone.FMSynth().toDestination(); synth2.volume.value = -18;
            const part2 = new Tone.Sequence((time, note) => { synth2.triggerAttackRelease(note, "8n", time); }, ["C2", "C2", "D#2", "F2", "C2", "C2", "G2", "F2"], "4n");
            
            // Track 3: 未來旋律 (戰鬥)
            const synth3 = new Tone.AMSynth().toDestination(); synth3.volume.value = -18;
            const part3 = new Tone.Sequence((time, note) => { synth3.triggerAttackRelease(note, "16n", time); }, ["G4", null, "D5", null, "C5", "B4", "A4", "G4"], "8n");

            bgmSynths = [synth0, synth1, synth2, synth3];
            bgmParts = [part0, part1, part2, part3];
            
            isAudioInit = true;
            document.getElementById('audio-init-overlay').classList.add('hidden');
            showMenu();
        }

        function playTrack(idx) {
            if(!isAudioInit) return;
            if(currentTrackIdx !== -1) bgmParts[currentTrackIdx].stop();
            currentTrackIdx = idx;
            bgmParts[idx].start(0);
            Tone.Transport.start();
        }

        const pythagoreanTriples = [
            { o: 3, a: 4, h: 5 }, { o: 6, a: 8, h: 10 }, { o: 5, a: 12, h: 13 }, 
            { o: 8, a: 15, h: 17 }, { o: 9, a: 12, h: 15 }, { o: 7, a: 24, h: 25 }
        ];

        const p1 = createPlayer(1, 'cyan', 'p1');
        const p2 = createPlayer(2, 'purple', 'p2');
        let p1ShipPos = 0; let p2ShipPos = 0;

        function createPlayer(id, color, prefix) {
            return {
                id, color, prefix, score: 0, corrects: 0, wrongAttempts: 0,
                qStart: 0, currentQ: null, isGenerating: false, dndState: {} 
            };
        }

        function setDiff(lvl) {
            difficulty = lvl;
            const b1 = document.getElementById('btn-lvl1');
            const b2 = document.getElementById('btn-lvl2');
            b1.className = `flex-1 py-2 md:py-3 ${lvl===1 ? 'bg-cyan-600/90 text-white shadow-[0_0_10px_rgba(0,255,255,0.5)] border-cyan-400' : 'bg-gray-800/80 text-gray-400 border-transparent'} rounded-xl font-bold border-2 font-space text-base md:text-lg transition`;
            b2.className = `flex-1 py-2 md:py-3 ${lvl===2 ? 'bg-cyan-600/90 text-white shadow-[0_0_10px_rgba(0,255,255,0.5)] border-cyan-400' : 'bg-gray-800/80 text-gray-400 border-transparent'} rounded-xl font-bold border-2 font-space text-base md:text-lg transition`;
        }

        function setMode(selectedMode) {
            mode = selectedMode;
            const bC = document.getElementById('btn-mode-count');
            const bT = document.getElementById('btn-mode-time');
            const bP = document.getElementById('btn-mode-prac');
            const sC = document.getElementById('setting-count');
            const sT = document.getElementById('setting-time');
            
            [bC, bT, bP].forEach(b => b.className = "flex-1 py-2 md:py-3 bg-gray-800/80 text-gray-400 rounded-xl font-bold border-2 border-transparent transition text-sm md:text-base");
            sC.classList.add('hidden'); sT.classList.add('hidden');

            const activeClass = "flex-1 py-2 md:py-3 bg-purple-600/90 text-white rounded-xl font-bold border-2 border-purple-400 transition shadow-[0_0_10px_rgba(192,132,252,0.5)] text-sm md:text-base";
            if(mode === 'COUNT') { bC.className = activeClass; sC.classList.remove('hidden'); }

        function showMenu() {
            document.getElementById('mainMenu').classList.remove('hidden');
            document.getElementById('endScreen').classList.add('hidden');
            document.getElementById('gameUI').classList.add('hidden');
            gameState = 'MENU';
            
            // 首頁隨機播放四首其中一首
            menuTrackIdx = Math.floor(Math.random() * 4);
            playTrack(menuTrackIdx);
        }

        function startPreGameCountdown() {
            maxCount = parseInt(document.getElementById('input-count').value) || 10;
            maxTime = parseInt(document.getElementById('input-time').value) || 60;
            maxPersonalTime = parseInt(document.getElementById('input-personal').value) || 30;
            
            document.getElementById('mainMenu').classList.add('hidden');
            const countdownEl = document.getElementById('preGameCountdown');
            const numEl = document.getElementById('countdownNumber');
            countdownEl.classList.remove('hidden');
            
            let count = 3; numEl.innerText = count;
            
            let intv = setInterval(() => {
                count--;
                if(count > 0) numEl.innerText = count;
                else { clearInterval(intv); countdownEl.classList.add('hidden'); actualGameStart(); }
            }, 1000);
        }

        function actualGameStart() {
            document.getElementById('gameUI').classList.remove('hidden');
            
            p1.score = 0; p1.corrects = 0; p1.wrongAttempts = 0;
            p2.score = 0; p2.corrects = 0; p2.wrongAttempts = 0;
            p1ShipPos = 0; p2ShipPos = 0;
            globalQuestionsAnswered = 0;
            gameState = 'PLAYING';
            startTime = Date.now();
            lasers = []; particles = [];

            // 戰鬥隨機切換另外一首 (1-3)
            let battleTrack = Math.floor(Math.random() * 3) + 1;
            playTrack(battleTrack);

            if(mode === 'PRACTICE') {
                document.getElementById('gameInfoText').innerText = i18n[currentLang].pracModeInfo;
                document.querySelector('.health-bar-container').classList.add('invisible');
            } else {
                document.querySelector('.health-bar-container').classList.remove('invisible');
            }

            updateHeaderUI(); updateHealthBar();
            generateQuestion(p1); generateQuestion(p2);

            clearInterval(mainTimer);
            mainTimer = setInterval(gameTick, 100);
            resizeCanvas();
        }

        function gameTick() {
            if(gameState !== 'PLAYING') return;
            
            const t = i18n[currentLang];
            if(mode === 'TIME') {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const left = Math.max(0, maxTime - elapsed);
                document.getElementById('gameInfoText').innerText = t.timeLeft(left);
                if(left <= 0) forceEndGame(t.timeUp);
            } else if (mode === 'COUNT') {
                document.getElementById('gameInfoText').innerText = t.prog(globalQuestionsAnswered, maxCount);
                if(globalQuestionsAnswered >= maxCount) forceEndGame(t.countReached);
            }

            [p1, p2].forEach(player => {
                const workspace = document.getElementById(`${player.prefix}-workspace`);
                if(!player.isGenerating && player.qStart > 0 && mode !== 'PRACTICE') {
                    const elapsed = (Date.now() - player.qStart) / 1000;
                    const left = Math.max(0, maxPersonalTime - elapsed);
                    document.getElementById(`timer-bar-${player.prefix}`).style.width = `${(left/maxPersonalTime)*100}%`;
                    
                    if(left <= 3 && left > 0) workspace.classList.add('crisis-alert');
                    else workspace.classList.remove('crisis-alert');

                    if(left <= 0) {
                        player.isGenerating = true; 
                        workspace.classList.remove('crisis-alert');
                        triggerWrongAnswer(player);
                    }
                } else if (mode === 'PRACTICE') {
                    document.getElementById(`timer-bar-${player.prefix}`).style.width = `100%`;
                    workspace.classList.remove('crisis-alert');
                }
            });
        }

        function updateHeaderUI() {
            document.getElementById('p1-score').innerText = p1.score;
            document.getElementById('p2-score').innerText = p2.score;
        }

        function updateHealthBar() {
            const diff = p1ShipPos - p2ShipPos;
            let p1Percent = 50 + (diff / 7) * 50;
            p1Percent = Math.max(0, Math.min(100, p1Percent));
            
            document.getElementById('hb-p1').style.width = `${p1Percent}%`;
            document.getElementById('hb-p2').style.width = `${100 - p1Percent}%`;
            document.getElementById('hb-junction').style.left = `${p1Percent}%`;

            if (Math.abs(diff) >= 7) {
                const t = i18n[currentLang];
                setTimeout(() => forceEndGame(diff > 0 ? t.winP1 : t.winP2), 500);
            }
        }

        function triggerCorrectAnswer(player) {
            player.isGenerating = true;
            document.getElementById(`${player.prefix}-workspace`).classList.remove('crisis-alert');

            if(mode === 'PRACTICE') { showPracticeFeedback(player, true); return; }

            const timeTaken = Math.floor((Date.now() - player.qStart) / 1000);
            const points = Math.max(10, 120 - timeTaken);
            player.score += points;
            player.corrects++;
            globalQuestionsAnswered++;
            
            if(player.id === 1) {
                p1ShipPos = Math.min(7, p1ShipPos + 1); p2ShipPos = Math.max(0, p2ShipPos - 1);
                shootLaser(p1Ships[p1ShipPos], p2Ships[p2ShipPos], '#0ff');
            } else {
                p2ShipPos = Math.min(7, p2ShipPos + 1); p1ShipPos = Math.max(0, p1ShipPos - 1);
                shootLaser(p2Ships[p2ShipPos], p1Ships[p1ShipPos], '#c084fc');
            }

            updateHeaderUI(); updateHealthBar();
            
            const ws = document.getElementById(`${player.prefix}-workspace`);
            ws.classList.add('flash-correct');
            const dzs = ws.querySelectorAll('.drop-zone.filled');
            dzs.forEach(dz => dz.classList.add('flash-correct'));

            setTimeout(() => { ws.classList.remove('flash-correct'); generateQuestion(player); }, 600);
        }

        function triggerWrongAnswer(player) {
            player.isGenerating = true;
            document.getElementById(`${player.prefix}-workspace`).classList.remove('crisis-alert');

            if(mode === 'PRACTICE') { showPracticeFeedback(player, false); return; }

            player.score = Math.max(0, player.score - 20); 
            player.wrongAttempts++;
            updateHeaderUI();
            
            const ws = document.getElementById(`${player.prefix}-workspace`);
            ws.classList.add('shake-err');
            setTimeout(() => ws.classList.remove('shake-err'), 300);

            if(difficulty === 2) {
                setTimeout(() => generateQuestion(player), 400);
            } else {
                if(player.wrongAttempts >= 2 || (Date.now() - player.qStart) >= (maxPersonalTime*1000)) { 
                    setTimeout(() => generateQuestion(player), 400);
                } else {
                    player.dndState = {};
                    setTimeout(() => {
                        renderLevel1Workspace(player);
                        player.isGenerating = false;
                    }, 300);
                }
            }
        }

        function animateValue(obj, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const easeOutProgress = progress === 1 ? 1 : 1 - Math.pow(2, -10 * progress);
                obj.innerHTML = Math.floor(easeOutProgress * (end - start) + start);
                if (progress < 1) window.requestAnimationFrame(step);
                else obj.innerHTML = end; 
            };
            window.requestAnimationFrame(step);
        }

        function forceEndGame(reason) { endGame(reason); }

        function endGame(reason) {
            gameState = 'END';
            clearInterval(mainTimer);
            document.getElementById('gameUI').classList.add('hidden');
            const endScr = document.getElementById('endScreen');
            endScr.classList.remove('hidden');
            
            // 結束播放首頁音樂
            if(menuTrackIdx !== -1) playTrack(menuTrackIdx);

            const t = i18n[currentLang];
            let finalReason = reason;
            if(!reason) {
                if(p1.score > p2.score) finalReason = t.winP1;
                else if (p2.score > p1.score) finalReason = t.winP2;
                else finalReason = t.draw;
            }
            document.getElementById('endTitle').innerText = finalReason;
            
            animateValue(document.getElementById('res-score1'), 0, p1.score, 3000);
            animateValue(document.getElementById('res-score2'), 0, p2.score, 3000);
            document.getElementById('res-cor1').innerText = p1.corrects;
            document.getElementById('res-cor2').innerText = p2.corrects;
        }

        function showPracticeFeedback(player, isCorrect) {
            const workspace = document.getElementById(`${player.prefix}-workspace`);
            const overlay = document.createElement('div');
            const t = i18n[currentLang];
            overlay.id = `practice-overlay-${player.prefix}`;
            overlay.className = "absolute inset-0 bg-black/80 z-40 flex flex-col items-center justify-center rounded-xl backdrop-blur-sm pointer-events-auto";
            if(isCorrect) {
                overlay.innerHTML = `<div class="text-green-400 text-2xl font-bold mb-4 font-space">${t.pracCorrect}</div><button onclick="nextPracticeQ(${player.id})" class="px-6 py-2 bg-green-600 rounded-lg text-white font-bold shadow-[0_0_10px_#16a34a]">${t.btnNext}</button>`;
            } else {
                overlay.innerHTML = `<div class="text-red-400 text-2xl font-bold mb-4 font-space">${t.pracWrong}</div><button onclick="retryPracticeQ(${player.id})" class="px-6 py-2 bg-red-600 rounded-lg text-white font-bold shadow-[0_0_10px_#dc2626]">${t.btnRetry}</button>`;
            }
            workspace.style.position = 'relative';
            workspace.appendChild(overlay);
        }

        function nextPracticeQ(pid) {
            let player = pid === 1 ? p1 : p2;
            const overlay = document.getElementById(`practice-overlay-${player.prefix}`);
            if(overlay) overlay.remove();
            generateQuestion(player);
        }

        function retryPracticeQ(pid) {
            let player = pid === 1 ? p1 : p2;
            const overlay = document.getElementById(`practice-overlay-${player.prefix}`);
            if(overlay) overlay.remove();
            
            player.dndState = {}; player.isGenerating = false; player.qStart = Date.now();
            if(difficulty === 2) renderLevel2Workspace(player, player.currentQ);
            else renderLevel1Workspace(player);
        }

        function fmt(num) {
            if(typeof num !== 'number') return num; // 處理字母情況
            if(Number.isInteger(num)) return num;
            return Number(num.toPrecision(3)); // 有效數字 3 位
        }

        function generateQuestion(player) {
            player.qStart = Date.now();
            player.isGenerating = false;
            player.dndState = {};
            player.wrongAttempts = 0;
            document.getElementById(`${player.prefix}-workspace`).classList.remove('crisis-alert');
            
            let o, a, h;
            // 難度 1 有一半機率出字母
            const useLetters = difficulty === 1 && Math.random() > 0.5;
            if(useLetters) {
                const lSets = [['a', 'b', 'c'], ['x', 'y', 'z'], ['p', 'q', 'r']];
                const ls = lSets[Math.floor(Math.random() * lSets.length)];
                o = ls[0]; a = ls[1]; h = ls[2];
            } else {
                const baseTriple = pythagoreanTriples[Math.floor(Math.random() * pythagoreanTriples.length)];
                const swap = Math.random() > 0.5;
                o = swap ? baseTriple.a : baseTriple.o;
                a = swap ? baseTriple.o : baseTriple.a;
                h = baseTriple.h;
            }
            
            const funcs = ['sin', 'cos', 'tan'];
            const func = funcs[Math.floor(Math.random() * funcs.length)];
            const rot = Math.floor(Math.random() * 360); // 全面隨機角度
            
            let q = { math: {o, a, h}, func, type: 0, rotation: rot };
            q.correctNum = func === 'sin' ? o : (func === 'cos' ? a : o);
            q.correctDen = func === 'tan' ? a : h;

            if(difficulty === 2) {
                q.type = Math.floor(Math.random() * 5) + 1; // 1~5
            } else {
                q.type = Math.floor(Math.random() * 3) + 1; // 1~3
            }

            if(q.type >= 4) {
                q.isMCQ = true;
                if (q.type === 4) {
                    let correctAns = func === 'sin' ? `${o}/${h}` : (func === 'cos' ? `${a}/${h}` : `${o}/${a}`);
                    let opts = [correctAns, `${a}/${h}`, `${o}/${a}`, `${h}/${o}`];
                    if(func==='cos'){ opts[1] = `${o}/${h}`; opts[2] = `${a}/${o}`; }
                    if(func==='tan'){ opts[1] = `${h}/${a}`; opts[3] = `${a}/${o}`; }
                    q.options = [...new Set(opts)];
                    while(q.options.length < 4) {
                        q.options.push(`${Math.floor(Math.random()*10)+1}/${Math.floor(Math.random()*15)+1}`);
                        q.options = [...new Set(q.options)];
                    }
                    q.options.sort(() => Math.random() - 0.5);
                    q.answer = correctAns;
                } else if (q.type === 5) {
                    // Type 5: 給定邊長，求角度度數 (非畢氏三元素)
                    let op = Math.floor(Math.random() * 15) + 3;
                    let ad = Math.floor(Math.random() * 15) + 3;
                    let hy = Math.sqrt(op*op + ad*ad);
                    
                    q.math = { o: fmt(op), a: fmt(ad), h: fmt(hy) };
                    let thetaDeg = Math.atan2(op, ad) * 180 / Math.PI;
                    q.answer = fmt(thetaDeg) + "°";
                    
                    let opts = [q.answer];
                    while(opts.length < 4) {
                        let fakeTheta = thetaDeg + (Math.random() * 40 - 20);
                        if(fakeTheta < 1 || fakeTheta > 89) fakeTheta = Math.random() * 89 + 1;
                        let fake = fmt(fakeTheta) + "°";
                        if(!opts.includes(fake)) opts.push(fake);
                    }
                    q.options = opts.sort(() => Math.random() - 0.5);
                    q.promptType5 = `θ = ?`;
                }
                player.currentQ = q; renderLevel2Workspace(player, q);
            } else {
                player.currentQ = q; renderLevel1Workspace(player);
            }
        }

        function getSVG(o, a, h, config) {
            const size = 200; 
            const pad = 50;   
            
            // 處理字母或數字以計算合適的畫圖比例
            let mockO = typeof o === 'string' ? 5 : o;
            let mockA = typeof a === 'string' ? 5 : a;
            const scale = Math.min((size - pad*2) / mockA, (size - pad*2) / mockO);
            const drawA = mockA * scale;
            const drawO = mockO * scale;
            
            const pRightX = size - pad; const pRightY = size - pad + 10; 
            const pBotLeftX = pRightX - drawA; const pBotLeftY = pRightY;
            const pTopRightX = pRightX; const pTopRightY = pRightY - drawO;

            const cx = (pBotLeftX + pRightX + pTopRightX) / 3;
            const cy = (pBotLeftY + pRightY + pTopRightY) / 3;
            const rot = config.rotation || 0;

            function rotatePoint(x, y) {
                const rad = rot * Math.PI / 180;
                const nx = Math.cos(rad)*(x-cx) - Math.sin(rad)*(y-cy) + cx;
                const ny = Math.sin(rad)*(x-cx) + Math.cos(rad)*(y-cy) + cy;
                return {x: nx, y: ny};
            }

            let svg = `<svg width="100%" height="100%" viewBox="0 0 ${size} ${size}">`;
            svg += `<g transform="rotate(${rot}, ${cx}, ${cy})">`;
            svg += `<polygon points="${pBotLeftX},${pBotLeftY} ${pRightX},${pRightY} ${pTopRightX},${pTopRightY}" class="svg-tri ${config.colorClass}"/>`;
            svg += `<polyline points="${pRightX-12},${pRightY} ${pRightX-12},${pRightY-12} ${pRightX},${pRightY-12}" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>`;

            if(config.showTheta) {
                const angleRad = Math.atan2(-drawO, drawA);
                if(config.thetaPos === 'bottom') {
                    svg += `<path d="M ${pBotLeftX+20} ${pBotLeftY} A 20 20 0 0 0 ${pBotLeftX + 20*Math.cos(angleRad)} ${pBotLeftY + 20*Math.sin(angleRad)}" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>`;
                } else {
                    svg += `<path d="M ${pTopRightX-20} ${pTopRightY} A 20 20 0 0 0 ${pTopRightX} ${pTopRightY+20}" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>`;
                }
            }
            svg += `</g>`;

            let dropZoneA = rotatePoint(pBotLeftX, pBotLeftY);
            let dropZoneC = rotatePoint(pTopRightX, pTopRightY);

            if(config.showSides) {
                function getTextPos(p1X, p1Y, p2X, p2Y) {
                    const rp1 = rotatePoint(p1X, p1Y); const rp2 = rotatePoint(p2X, p2Y);
                    const midX = (rp1.x + rp2.x)/2; const midY = (rp1.y + rp2.y)/2;
                    const dx = midX - cx; const dy = midY - cy;
                    const len = Math.hypot(dx, dy) || 1;
                    // 將距離由原本的 40 縮減至 18，讓數字貼近邊線且不重疊
                    return {x: midX + (dx/len)*18, y: midY + (dy/len)*18}; 
                }
                const posA = getTextPos(pBotLeftX, pBotLeftY, pRightX, pRightY);
                const posO = getTextPos(pRightX, pRightY, pTopRightX, pTopRightY);
                const posH = getTextPos(pTopRightX, pTopRightY, pBotLeftX, pBotLeftY);

                // 移除了 font-space 樣式，改用預設的普通字體以利辨認
                svg += `<text x="${posA.x}" y="${posA.y + 6}" class="tri-text" font-size="16">${a}</text>`;
                svg += `<text x="${posO.x}" y="${posO.y + 6}" class="tri-text" font-size="16">${o}</text>`;
                svg += `<text x="${posH.x}" y="${posH.y + 6}" class="tri-text" font-size="16">${h}</text>`;
            }

            if(config.showTheta) {
                function getThetaPos(angX, angY) {
                    const ra = rotatePoint(angX, angY);
                    const dx = ra.x - cx; const dy = ra.y - cy;
                    const len = Math.hypot(dx, dy) || 1;
                    return {x: ra.x - (dx/len)*38, y: ra.y - (dy/len)*38}; 
                }
                let tPos = config.thetaPos === 'bottom' ? getThetaPos(pBotLeftX, pBotLeftY) : getThetaPos(pTopRightX, pTopRightY);
                svg += `<text x="${tPos.x}" y="${tPos.y + 6}" class="tri-text font-space" fill="#ffeb3b" font-size="16">θ</text>`;
            }

            svg += `</svg>`;
            return { html: svg, coords: { bl: dropZoneA, tr: dropZoneC, scaleSize: size } };
        }

        function renderLevel2Workspace(player, q) {
            const promptText = q.type === 4 ? `${q.func}(θ) = ?` : q.promptType5;
            document.getElementById(`${player.prefix}-prompt`).innerHTML = `<span class="text-xl md:text-2xl font-space">${promptText}</span>`;
            
            const svgData = getSVG(q.math.o, q.math.a, q.math.h, { showSides: true, showTheta: q.type===4, thetaPos: 'bottom', colorClass: `${player.prefix}-color`, rotation: q.rotation });
            document.getElementById(`${player.prefix}-svg-container`).innerHTML = svgData.html;

            const inter = document.getElementById(`${player.prefix}-interaction`);
            inter.className = "grid grid-cols-2 gap-1 md:gap-2 flex-1 w-full max-h-[100px]"; inter.innerHTML = '';

            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = `btn-l2 text-white font-space text-sm md:text-lg rounded-lg font-bold w-full h-full min-h-[40px]`;
                
                if(opt.includes('/')) {
                    const [n, d] = opt.split('/');
                    btn.innerHTML = `<div class="inline-flex flex-col items-center leading-none justify-center h-full"><span class="border-b-[2px] border-white/80 px-2 pb-[2px]">${n}</span><span class="px-2 pt-[3px]">${d}</span></div>`;
                } else { btn.innerHTML = opt; }
                
                btn.onclick = () => { if(opt === q.answer) triggerCorrectAnswer(player); else triggerWrongAnswer(player); };
                inter.appendChild(btn);
            });
        }

        function renderLevel1Workspace(player) {
            const q = player.currentQ;
            const promptEl = document.getElementById(`${player.prefix}-prompt`);
            const svgEl = document.getElementById(`${player.prefix}-svg-container`);
            const interEl = document.getElementById(`${player.prefix}-interaction`);
            
            interEl.className = "h-12 md:h-16 flex items-center justify-center gap-2 md:gap-3";
            let svgHtml = '';
            
            if(q.type === 1) { 
                const dzNum = `<div class="drop-zone w-10 h-8 md:w-12 md:h-10 ${player.dndState.num ? 'filled' : ''} font-space text-base md:text-lg bg-gray-800" data-target="num" data-pid="${player.id}">${player.dndState.num || '?'}</div>`;
                const dzDen = `<div class="drop-zone w-10 h-8 md:w-12 md:h-10 ${player.dndState.den ? 'filled' : ''} font-space text-base md:text-lg bg-gray-800" data-target="den" data-pid="${player.id}">${player.dndState.den || '?'}</div>`;
                promptEl.innerHTML = `<div class="flex items-center"><span class="text-xl md:text-2xl font-space mr-2">${q.func}(θ) = </span><div class="flex flex-col items-center gap-1"><div class="relative">${dzNum}</div><div class="w-full h-1 bg-white rounded"></div><div class="relative">${dzDen}</div></div></div>`;

                svgHtml = getSVG(q.math.o, q.math.a, q.math.h, { showSides: true, showTheta: true, thetaPos: 'bottom', colorClass: `${player.prefix}-color`, rotation: q.rotation }).html;
                svgEl.innerHTML = svgHtml;

                interEl.innerHTML = '';
                [q.math.o, q.math.a, q.math.h].sort((a,b)=>String(a).localeCompare(String(b))).forEach(val => {
                    const isHidden = (player.dndState.num == val || player.dndState.den == val) ? 'opacity-0 pointer-events-none' : '';
                    interEl.innerHTML += `<div class="draggable w-10 h-8 md:w-12 md:h-10 text-base md:text-xl font-space bg-gray-700 ${isHidden}" data-val="${val}" data-pid="${player.id}">${val}</div>`;
                });

            } else if (q.type === 2) { 
                const dzFunc = `<div class="drop-zone w-12 h-8 md:w-16 md:h-10 mx-1 font-space text-base md:text-lg bg-gray-800" data-target="func" data-pid="${player.id}">?</div>`;
                promptEl.innerHTML = `<div class="flex items-center text-lg md:text-2xl font-space">${dzFunc} (θ) = <div class="inline-flex flex-col items-center leading-none mx-2 text-base md:text-xl"><span class="border-b-[2px] border-white/80 px-2 pb-[2px]">${q.correctNum}</span><span class="px-2 pt-[3px]">${q.correctDen}</span></div></div>`;

                svgHtml = getSVG(q.math.o, q.math.a, q.math.h, { showSides: true, showTheta: true, thetaPos: 'bottom', colorClass: `${player.prefix}-color`, rotation: q.rotation }).html;
                svgEl.innerHTML = svgHtml;

                interEl.innerHTML = '';
                ['sin', 'cos', 'tan'].forEach(val => {
                    interEl.innerHTML += `<div class="draggable w-14 h-8 md:w-16 md:h-10 text-sm md:text-lg font-space bg-gray-700" data-val="${val}" data-pid="${player.id}">${val}</div>`;
                });

            } else if (q.type === 3) { 
                promptEl.innerHTML = `<span class="text-base md:text-xl font-space">${q.func}(θ) = <div class="inline-flex flex-col items-center leading-none align-middle mx-1 text-sm md:text-lg"><span class="border-b-[2px] border-white/80 px-1 pb-[2px]">${q.correctNum}</span><span class="px-1 pt-[3px]">${q.correctDen}</span></div> <br><span class="text-xs md:text-sm mt-1 block text-gray-300">${i18n[currentLang].dragHelp}</span></span>`;
                
                const svgData = getSVG(q.math.o, q.math.a, q.math.h, { showSides: true, showTheta: false, colorClass: `${player.prefix}-color`, rotation: q.rotation });
                svgEl.innerHTML = svgData.html;

                setTimeout(() => { 
                    const rect = svgEl.getBoundingClientRect();
                    const scale = Math.min(rect.width, rect.height) / svgData.coords.scaleSize;
                    const offsetX = (rect.width - svgData.coords.scaleSize * scale) / 2;
                    const offsetY = (rect.height - svgData.coords.scaleSize * scale) / 2;

                    const blX = offsetX + svgData.coords.bl.x * scale; const blY = offsetY + svgData.coords.bl.y * scale;
                    const trX = offsetX + svgData.coords.tr.x * scale; const trY = offsetY + svgData.coords.tr.y * scale;

                    svgEl.innerHTML += `<div class="drop-zone absolute rounded-full w-10 h-10 md:w-12 md:h-12" style="left:${blX-20}px; top:${blY-20}px" data-target="angle_bottom" data-pid="${player.id}"></div>`;
                    svgEl.innerHTML += `<div class="drop-zone absolute rounded-full w-10 h-10 md:w-12 md:h-12" style="left:${trX-20}px; top:${trY-20}px" data-target="angle_top" data-pid="${player.id}"></div>`;
                }, 10);

                interEl.innerHTML = `<div class="draggable w-10 h-10 md:w-12 md:h-12 rounded-full text-lg md:text-2xl font-space bg-yellow-600 border-yellow-300 shadow-[0_0_10px_rgba(250,204,21,0.5)]" data-val="theta" data-pid="${player.id}">θ</div>`;
            }
            setTimeout(() => attachDragListeners(player), 50);
        }

        let activeDrag = null; let ghostEl = null;

        function attachDragListeners(player) {
            const draggables = document.querySelectorAll(`.draggable[data-pid="${player.id}"]`);
            draggables.forEach(el => { el.addEventListener('pointerdown', handleDragStart); });
        }

        function handleDragStart(e) {
            e.preventDefault(); if(activeDrag) return;
            const el = e.currentTarget;
            activeDrag = { element: el, val: el.getAttribute('data-val'), pid: parseInt(el.getAttribute('data-pid')) };

            ghostEl = el.cloneNode(true); ghostEl.classList.add('ghost-drag');
            ghostEl.style.left = `${e.clientX - el.offsetWidth/2}px`; ghostEl.style.top = `${e.clientY - el.offsetHeight/2}px`;
            document.body.appendChild(ghostEl);
            el.style.opacity = '0.3';
            
            document.addEventListener('pointermove', handleDragMove, {passive: false});
            document.addEventListener('pointerup', handleDragEnd);
        }

        function handleDragMove(e) {
            e.preventDefault(); if(!ghostEl) return;
            ghostEl.style.left = `${e.clientX - ghostEl.offsetWidth/2}px`; ghostEl.style.top = `${e.clientY - ghostEl.offsetHeight/2}px`;
        }

        function handleDragEnd(e) {
            document.removeEventListener('pointermove', handleDragMove);
            document.removeEventListener('pointerup', handleDragEnd);
            if(!activeDrag || !ghostEl) return;

            ghostEl.style.visibility = 'hidden'; 
            const elements = document.elementsFromPoint(e.clientX, e.clientY);
            let dropZone = elements.find(el => el.classList.contains('drop-zone') && parseInt(el.getAttribute('data-pid')) === activeDrag.pid);
            
            const player = activeDrag.pid === 1 ? p1 : p2; const val = activeDrag.val;

            if (dropZone) processDrop(player, val, dropZone.getAttribute('data-target'));
            else activeDrag.element.style.opacity = '1';

            ghostEl.remove(); ghostEl = null; activeDrag = null;
        }

        function processDrop(player, val, target) {
            const q = player.currentQ; let checkTriggered = false;

            if (q.type === 1) { 
                if(target === 'num') player.dndState.num = val;
                if(target === 'den') player.dndState.den = val;
                renderLevel1Workspace(player);

                if (player.dndState.num && player.dndState.den) {
                    checkTriggered = true;
                    if (player.dndState.num == q.correctNum && player.dndState.den == q.correctDen) triggerCorrectAnswer(player);
                    else triggerWrongAnswer(player);
                }
            } 
            else if (q.type === 2) { 
                checkTriggered = true;
                if (val === q.func) triggerCorrectAnswer(player); else triggerWrongAnswer(player);
            }
            else if (q.type === 3) { 
                checkTriggered = true;
                if (target === 'angle_bottom') triggerCorrectAnswer(player); else triggerWrongAnswer(player);
            }

            if(!checkTriggered) renderLevel1Workspace(player); 
        }

        const canvas = document.getElementById('gameCanvas'); const ctx = canvas.getContext('2d');
        let canvasW, canvasH, p1Ships = [], p2Ships = [], lasers = [], particles = [], stars = [];

        function resizeCanvas() {
            canvasW = window.innerWidth; canvasH = window.innerHeight;
            canvas.width = canvasW; canvas.height = canvasH;
            
            stars = [];
            for(let i=0; i<150; i++) stars.push({ x: Math.random()*canvasW, y: Math.random()*canvasH, speed: Math.random()*0.5+0.1, size: Math.random()*1.5 });

            const centerX = canvasW / 2; const topY = 120; const botY = canvasH - 50; const stepY = (botY - topY) / 7;
            p1Ships = []; p2Ships = [];
            for(let i=0; i<=7; i++) {
                p1Ships.push({ x: centerX - (canvasW<768?25:45), y: botY - (i * stepY) });
                p2Ships.push({ x: centerX + (canvasW<768?25:45), y: botY - (i * stepY) });
            }
        }
        window.addEventListener('resize', resizeCanvas);

        function shootLaser(fromObj, toObj, color) { lasers.push({ x: fromObj.x, y: fromObj.y, tx: toObj.x, ty: toObj.y, prog: 0, color: color }); }
        function createExplosion(x, y, color) { for(let i=0; i<15; i++) particles.push({ x, y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, life: 1, color }); }

        function renderCanvas() {
            ctx.clearRect(0, 0, canvasW, canvasH);
            
            ctx.fillStyle = '#fff';
            stars.forEach(s => {
                ctx.globalAlpha = Math.random()*0.5 + 0.3;
                ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill();
                s.y += s.speed; if(s.y > canvasH) s.y = 0;
            });
            ctx.globalAlpha = 1.0;

            if(gameState !== 'PLAYING') { requestAnimationFrame(renderCanvas); return; }

            ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.beginPath();
            ctx.moveTo(p1Ships[0].x, p1Ships[0].y); ctx.lineTo(p1Ships[7].x, p1Ships[7].y);
            ctx.moveTo(p2Ships[0].x, p2Ships[0].y); ctx.lineTo(p2Ships[7].x, p2Ships[7].y); ctx.stroke();

            const now = Date.now(); const f1 = Math.sin(now/400) * 6; const f2 = Math.cos(now/400) * 6;

            ctx.font = '28px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            
            const s1 = p1Ships[p1ShipPos];
            ctx.shadowColor = '#0ff'; ctx.shadowBlur = 20; ctx.fillText('🚀', s1.x, s1.y + f1);
            
            const s2 = p2Ships[p2ShipPos];
            ctx.shadowColor = '#c084fc'; ctx.shadowBlur = 20; ctx.save(); ctx.translate(s2.x, s2.y + f2); ctx.scale(-1, 1);
            ctx.fillText('🚀', 0, 0); ctx.restore(); ctx.shadowBlur = 0;

            for(let i=lasers.length-1; i>=0; i--) {
                const l = lasers[i]; l.prog += 0.2;
                const cx = l.x + (l.tx - l.x)*l.prog; const cy = l.y + (l.ty - l.y)*l.prog;
                
                ctx.strokeStyle = l.color; ctx.lineWidth = 4; ctx.shadowColor = l.color; ctx.shadowBlur = 10;
                ctx.beginPath(); ctx.moveTo(l.x, l.y); ctx.lineTo(cx, cy); ctx.stroke(); ctx.shadowBlur = 0;

                if(l.prog >= 1) { createExplosion(l.tx, l.ty, l.color); lasers.splice(i, 1); }
            }

            for(let i=particles.length-1; i>=0; i--) {
                const p = particles[i]; p.x += p.vx; p.y += p.vy; p.life -= 0.05;
                if(p.life <= 0) particles.splice(i, 1);
                else {
                    ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
                    ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill(); ctx.globalAlpha = 1.0;
                }
            }
            requestAnimationFrame(renderCanvas);
        }

        window.onload = function() {
            document.getElementById('audio-init-overlay').classList.remove('hidden');
            resizeCanvas(); renderCanvas();
        }
    </script>
</body>
</html>
